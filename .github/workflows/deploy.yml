name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .env from secrets
        run: |
          cat > .env <<EOF
          OPENCLAW_IMAGE=ghcr.io/openclaw/openclaw:latest
          OPENCLAW_GATEWAY_PORT=18789
          OPENCLAW_GATEWAY_BIND=loopback
          OPENCLAW_CONFIG_DIR=/root/.openclaw
          OPENCLAW_WORKSPACE_DIR=/root/.openclaw/workspace
          OPENCLAW_TZ=${{ secrets.TZ || 'Europe/Moscow' }}
          OPENCLAW_GATEWAY_TOKEN=${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          GOG_KEYRING_PASSWORD=${{ secrets.GOG_KEYRING_PASSWORD }}
          DOMAIN=${{ secrets.DOMAIN }}
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENCLAW_SKIP_ONBOARDING=1
          EOF

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync repo to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" 'mkdir -p /opt/elena'
          rsync -az --delete \
            --exclude '.git' --exclude '.github' --exclude 'node_modules' \
            -e "ssh -p $VPS_PORT" \
            ./ "$VPS_USER@$VPS_HOST:/opt/elena/"
          scp -P "$VPS_PORT" .env "$VPS_USER@$VPS_HOST:/opt/elena/.env"

      - name: Run bootstrap on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            'cd /opt/elena && chmod +x scripts/bootstrap-vps.sh && bash scripts/bootstrap-vps.sh'

      - name: Cleanup
        if: always()
        run: rm -f .env ~/.ssh/id_ed25519
