name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || 'root' }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      SSHPASS: ${{ secrets.VPS_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          [[ -n "$VPS_HOST" ]] || { echo "::error::Add secret VPS_HOST"; exit 1; }
          [[ -n "$SSHPASS" ]]  || { echo "::error::Add secret VPS_PASSWORD"; exit 1; }

      - name: Build .env
        run: |
          cat > .env <<EOF
          OPENCLAW_IMAGE=ghcr.io/openclaw/openclaw:latest
          OPENCLAW_GATEWAY_PORT=18789
          OPENCLAW_GATEWAY_BIND=loopback
          OPENCLAW_CONFIG_DIR=/root/.openclaw
          OPENCLAW_WORKSPACE_DIR=/root/.openclaw/workspace
          OPENCLAW_TZ=${{ secrets.TZ || 'Europe/Moscow' }}
          OPENCLAW_GATEWAY_TOKEN=${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          GOG_KEYRING_PASSWORD=${{ secrets.GOG_KEYRING_PASSWORD }}
          DOMAIN=${{ secrets.DOMAIN }}
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENCLAW_SKIP_ONBOARDING=1
          EOF

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync repo to VPS
        run: |
          SSH="sshpass -e ssh -p $VPS_PORT -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no"
          SCP="sshpass -e scp -P $VPS_PORT -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no"
          $SSH "$VPS_USER@$VPS_HOST" 'mkdir -p /opt/elena'
          rsync -az --delete \
            --exclude '.git' --exclude '.github' --exclude 'node_modules' \
            -e "$SSH" \
            ./ "$VPS_USER@$VPS_HOST:/opt/elena/"
          $SCP .env "$VPS_USER@$VPS_HOST:/opt/elena/.env"

      - name: Run bootstrap on VPS
        run: |
          SSH="sshpass -e ssh -p $VPS_PORT -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no"
          $SSH "$VPS_USER@$VPS_HOST" \
            'cd /opt/elena && chmod +x scripts/bootstrap-vps.sh && bash scripts/bootstrap-vps.sh'

      - name: Cleanup
        if: always()
        run: rm -f .env
