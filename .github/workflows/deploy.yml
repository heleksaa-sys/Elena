name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || 'root' }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [[ -z "${{ secrets.VPS_HOST }}" ]]; then
            echo "::error::Add secret VPS_HOST"; exit 1
          fi
          if [[ -z "${{ secrets.VPS_PASSWORD }}" && -z "${{ secrets.VPS_SSH_KEY }}" ]]; then
            echo "::error::Add either VPS_PASSWORD or VPS_SSH_KEY"; exit 1
          fi

      - name: Build .env
        run: |
          cat > .env <<EOF
          OPENCLAW_IMAGE=ghcr.io/openclaw/openclaw:latest
          OPENCLAW_GATEWAY_PORT=18789
          OPENCLAW_GATEWAY_BIND=loopback
          OPENCLAW_CONFIG_DIR=/root/.openclaw
          OPENCLAW_WORKSPACE_DIR=/root/.openclaw/workspace
          OPENCLAW_TZ=${{ secrets.TZ || 'Europe/Moscow' }}
          OPENCLAW_GATEWAY_TOKEN=${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          GOG_KEYRING_PASSWORD=${{ secrets.GOG_KEYRING_PASSWORD }}
          DOMAIN=${{ secrets.DOMAIN }}
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENCLAW_SKIP_ONBOARDING=1
          EOF

      - name: Install sshpass
        if: ${{ secrets.VPS_SSH_KEY == '' }}
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

      - name: Setup SSH key auth
        if: ${{ secrets.VPS_SSH_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Pick auth method
        id: auth
        run: |
          if [[ -n "${{ secrets.VPS_SSH_KEY }}" ]]; then
            echo "ssh_cmd=ssh -p $VPS_PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" >> $GITHUB_OUTPUT
            echo "scp_cmd=scp -P $VPS_PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" >> $GITHUB_OUTPUT
            echo "rsync_e=ssh -p $VPS_PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" >> $GITHUB_OUTPUT
          else
            echo "ssh_cmd=sshpass -e ssh -p $VPS_PORT -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no" >> $GITHUB_OUTPUT
            echo "scp_cmd=sshpass -e scp -P $VPS_PORT -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no" >> $GITHUB_OUTPUT
            echo "rsync_e=sshpass -e ssh -p $VPS_PORT -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no" >> $GITHUB_OUTPUT
          fi

      - name: Sync repo to VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          ${{ steps.auth.outputs.ssh_cmd }} "$VPS_USER@$VPS_HOST" 'mkdir -p /opt/elena'
          rsync -az --delete \
            --exclude '.git' --exclude '.github' --exclude 'node_modules' \
            -e "${{ steps.auth.outputs.rsync_e }}" \
            ./ "$VPS_USER@$VPS_HOST:/opt/elena/"
          ${{ steps.auth.outputs.scp_cmd }} .env "$VPS_USER@$VPS_HOST:/opt/elena/.env"

      - name: Run bootstrap on VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          ${{ steps.auth.outputs.ssh_cmd }} "$VPS_USER@$VPS_HOST" \
            'cd /opt/elena && chmod +x scripts/bootstrap-vps.sh && bash scripts/bootstrap-vps.sh'

      - name: Cleanup
        if: always()
        run: rm -f .env ~/.ssh/id_ed25519
