name: Backup OpenClaw config

on:
  workflow_dispatch:
  schedule:
    # каждый день в 03:00 UTC
    - cron: "0 3 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pack config on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "tar -C /root -czf /tmp/openclaw-$STAMP.tgz .openclaw"
          scp -P "$VPS_PORT" "$VPS_USER@$VPS_HOST:/tmp/openclaw-$STAMP.tgz" .
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "rm -f /tmp/openclaw-$STAMP.tgz"
          echo "STAMP=$STAMP" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-backup-${{ env.STAMP }}
          path: openclaw-*.tgz
          retention-days: 30

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_ed25519 openclaw-*.tgz
