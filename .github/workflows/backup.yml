name: Backup OpenClaw config

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || 'root' }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      SSHPASS: ${{ secrets.VPS_PASSWORD }}
    steps:
      - name: Validate secrets
        run: |
          [[ -n "$VPS_HOST" ]] || { echo "::error::Add VPS_HOST"; exit 1; }
          [[ -n "$SSHPASS" ]]  || { echo "::error::Add VPS_PASSWORD"; exit 1; }

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Pack and download
        run: |
          SSH="sshpass -e ssh -p $VPS_PORT -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no"
          SCP="sshpass -e scp -P $VPS_PORT -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no"
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          $SSH "$VPS_USER@$VPS_HOST" "tar -C /root -czf /tmp/openclaw-$STAMP.tgz .openclaw"
          $SCP "$VPS_USER@$VPS_HOST:/tmp/openclaw-$STAMP.tgz" .
          $SSH "$VPS_USER@$VPS_HOST" "rm -f /tmp/openclaw-$STAMP.tgz"
          echo "STAMP=$STAMP" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-backup-${{ env.STAMP }}
          path: openclaw-*.tgz
          retention-days: 30

      - name: Cleanup
        if: always()
        run: rm -f openclaw-*.tgz
