# Caddy reverse proxy для OpenClaw gateway.
# host network mode — Caddy слушает 80/443 хоста напрямую и достаёт gateway по 127.0.0.1.
# Контейнер OpenClaw поднимает upstream scripts/docker/setup.sh.

name: elena

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-}
      DOMAIN_ALT: ${DOMAIN_ALT:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}

volumes:
  caddy_data:
  caddy_config:
